name: rat_race_escape
description: A financial life simulation game.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0' # Sử dụng Dart 3.x mới nhất

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & DI
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Models & Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0

  # Local Storage (thay Isar)
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.2.0
  path_provider: ^2.1.5

  # Navigation
  go_router: ^14.0.0

  # UI & Visualization
  google_fonts: ^6.2.1
  fl_chart: ^1.0.0

  # Utility
  intl: ^0.20.2
  fpdart: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^3.2.0
  json_serializable: ^6.9.0
  injectable_generator: ^2.6.0
  hive_ce_generator: ^1.8.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_lints: ^5.0.0

flutter:
  generate: true
  assets:
    - assets/config/scenarios/
    - assets/config/i18n/